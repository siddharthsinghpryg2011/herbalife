<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Management Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .input-field { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="notification" class="fixed top-5 right-5 hidden bg-red-600 text-white px-6 py-3 rounded shadow-lg z-50"></div>

    <div id="login-screen" class="max-w-md mx-auto mt-20 p-8 glass-card rounded-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Partner Login</h2>
        <input type="email" id="login-email" placeholder="Email" class="input-field mb-4">
        <input type="password" id="login-pass" placeholder="Password" class="input-field mb-6">
        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition">Login</button>
    </div>

    <div id="dashboard" class="hidden">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Welcome, <span id="user-display-name" class="text-blue-400"></span></h1>
            <button onclick="handleLogout()" class="bg-red-500/20 text-red-400 border border-red-500/50 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">Logout</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-6 rounded-xl h-fit">
                <h3 class="text-xl font-bold mb-4">Add New Downline</h3>
                <div class="space-y-3 text-sm">
                    <input type="text" id="f-name" placeholder="Full Name" class="input-field">
                    <input type="email" id="f-email" placeholder="Email" class="input-field">
                    <input type="text" id="f-pass" placeholder="Password" class="input-field">
                    <input type="text" id="f-phone" placeholder="Phone Number" class="input-field">
                    <input type="text" id="f-assoc" placeholder="Associate ID" class="input-field">
                    
                    <select id="f-level" class="input-field">
                        <option value="25%">25%</option>
                        <option value="35%">35% (Senior Consultant)</option>
                        <option value="42%">42% (Success Builder)</option>
                        <option value="50% S">50% (Supervisor)</option>
                        <option value="World Team">World Team</option>
                        <option value="Active World Team">Active World Team</option>
                        <option value="GET Team">GET Team</option>
                        <option value="President Team">President Team</option>
                    </select>

                    <div class="flex items-center gap-2 p-2">
                        <input type="checkbox" id="f-biz" class="w-4 h-4">
                        <label for="f-biz">Sponsor Business ID (Yes/No)</label>
                    </div>

                    <p class="text-gray-500 mt-2">Optional Details</p>
                    <input type="text" id="f-aadhar" placeholder="Aadhar Photo URL" class="input-field">
                    <input type="text" id="f-pan" placeholder="PAN Photo URL" class="input-field">
                    
                    <button onclick="addCard()" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-lg font-bold mt-4">Save Member</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h3 class="text-xl font-bold mb-4">Your Network</h3>
                <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="glass-card p-8 rounded-2xl w-full max-w-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://znelnyiupddbelcsuvns.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg');

        let currentUser = null;

        // --- Auth Logic ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('email', email)
                .eq('password', pass)
                .single();

            if (data) {
                currentUser = data;
                showDashboard();
            } else {
                showNotification("Invalid credentials!");
            }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = currentUser.name;
            fetchCards();
        }

        function handleLogout() {
            location.reload(); 
        }

        // --- Data Logic ---
        async function fetchCards() {
            // Logic: Show people where sponsor_id = current user's associate_id
            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('sponsor_id', currentUser.associates_id);

            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            // Add self card first
            renderCard(currentUser, true);

            data.forEach(profile => {
                renderCard(profile, false);
            });
        }

        function renderCard(profile, isSelf) {
            const container = document.getElementById('cards-container');
            const div = document.createElement('div');
            div.className = `glass-card p-5 rounded-xl cursor-pointer hover:border-blue-500 transition ${isSelf ? 'border-blue-500 border-2' : ''}`;
            div.innerHTML = `
                <div onclick="openDetails('${profile.id}')">
                    <h4 class="text-lg font-bold">${profile.name} ${isSelf ? '(You)' : ''}</h4>
                    <p class="text-blue-400 text-sm">${profile.level}</p>
                </div>
            `;
            container.appendChild(div);
        }

        async function addCard() {
            const payload = {
                name: document.getElementById('f-name').value,
                email: document.getElementById('f-email').value,
                password: document.getElementById('f-pass').value,
                phone: document.getElementById('f-phone').value,
                associates_id: document.getElementById('f-assoc').value,
                level: document.getElementById('f-level').value,
                has_business_id: document.getElementById('f-biz').checked,
                aadhar_photo_url: document.getElementById('f-aadhar').value,
                pan_photo_url: document.getElementById('f-pan').value,
                sponsor_id: currentUser.associates_id // Automatically set current user as sponsor
            };

            const { error } = await _supabase.from('profiles').insert([payload]);
            if (!error) {
                alert("Member Added!");
                fetchCards();
            }
        }

        async function openDetails(id) {
            const { data } = await _supabase.from('profiles').select('*').eq('id', id).single();
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">${data.name}</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    ${renderDetailRow("Email", data.email)}
                    ${renderDetailRow("Phone", data.phone)}
                    ${renderDetailRow("Password", data.password)}
                    ${renderDetailRow("Level", data.level)}
                    ${renderDetailRow("Associate ID", data.associates_id)}
                    <div><strong>Business ID:</strong> ${data.has_business_id ? 'Yes' : 'No'}</div>
                </div>
                <div class="mt-6 flex gap-4">
                    <button class="bg-blue-600 px-4 py-2 rounded">Edit Member</button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function renderDetailRow(label, value) {
            return `
                <div class="flex flex-col">
                    <span class="text-gray-400">${label}</span>
                    <div class="flex items-center justify-between bg-black/30 p-2 rounded">
                        <span>${value || 'N/A'}</span>
                        <button onclick="copyText('${value}')" class="text-blue-400 text-xs">Copy</button>
                    </div>
                </div>
            `;
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            showNotification("Copied to clipboard!");
        }

        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.classList.remove('hidden');
            setTimeout(() => n.classList.add('hidden'), 3000);
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
