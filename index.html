<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Vault | Advanced Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .input-dark { background: #121212; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; transition: 0.2s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .card-anim { transition: all 0.3s ease; }
        .card-anim:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen">

    <div id="toast" class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl shadow-2xl z-[100] text-white font-bold"></div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-8 md:p-10 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-black mb-2">Network Login</h2>
            <p class="text-gray-400 mb-8 text-sm">Access your downline database</p>
            
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="Email Address" class="input-dark">
                
                <div class="relative">
                    <input type="password" id="l-pass" placeholder="Password" class="input-dark">
                    <button onclick="togglePass('l-pass', this)" class="absolute right-3 top-3 text-xs text-blue-500 font-bold uppercase tracking-widest">Show</button>
                </div>

                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold mt-4 transition-all active:scale-95">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4 md:p-8 max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Hello, <span id="user-name" class="text-blue-500"></span></h1>
                <p class="text-xs text-gray-500">Associate ID: <span id="user-id-display" class="font-mono"></span></p>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 border border-red-500/20 px-6 py-2 rounded-xl hover:bg-red-500 hover:text-white transition w-full md:w-auto">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="md:col-span-2 relative">
                <input type="text" id="search-bar" oninput="filterCards()" placeholder="Search by Name, Email or ID..." class="input-dark pl-12">
                <span class="absolute left-4 top-3.5 text-gray-500">🔍</span>
            </div>
            <select id="filter-level" onchange="filterCards()" class="input-dark">
                <option value="All">All Levels</option>
                <option value="25%">25%</option>
                <option value="35%(senior consultant)">35% (Senior Consultant)</option>
                <option value="42%(success builder)">42% (Success Builder)</option>
                <option value="50%(Supervisior)">50% (Supervisor)</option>
                <option value="World Team">World Team</option>
                <option value="President Team">President Team</option>
            </select>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass p-6 rounded-2xl h-fit border-t-4 border-blue-600">
                <h3 class="text-lg font-bold mb-6">Add New Partner</h3>
                <div class="space-y-3">
                    <input type="text" id="f-name" placeholder="Full Name" class="input-dark">
                    <input type="text" id="f-sponsor-name" placeholder="Sponsor Name (Upline)" class="input-dark">
                    <input type="email" id="f-email" placeholder="Email" class="input-dark">
                    <input type="text" id="f-pass" placeholder="Password" class="input-dark">
                    <input type="text" id="f-phone" placeholder="Phone Number" class="input-dark">
                    <input type="text" id="f-assoc" placeholder="Associate ID" class="input-dark">
                    
                    <select id="f-level" class="input-dark">
                        <option value="25%">25%</option>
                        <option value="35%(senior consultant)">35% (Senior Consultant)</option>
                        <option value="42%(success builder)">42% (Success Builder)</option>
                        <option value="50%(Supervisior)">50% (Supervisor)</option>
                        <option value="World Team">World Team</option>
                        <option value="Active World Team">Active World Team</option>
                        <option value="GET Team">GET Team</option>
                        <option value="Millionaire Team">Millionaire Team</option>
                        <option value="President Team">President Team</option>
                    </select>

                    <label class="flex items-center space-x-3 p-3 rounded-lg bg-white/5 cursor-pointer hover:bg-white/10 transition">
                        <input type="checkbox" id="f-biz" class="w-5 h-5 accent-blue-600">
                        <span class="text-sm">Business ID Status (Yes)</span>
                    </label>
                    
                    <button onclick="saveMember()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold mt-4 shadow-lg shadow-blue-900/20 transition-all">Add to Database</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">Your Network Members</h3>
                    <span id="member-count" class="text-xs bg-white/10 px-3 py-1 rounded-full text-gray-400">0 Members</span>
                </div>
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="glass w-full max-w-xl p-8 rounded-3xl relative animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-2xl text-gray-500 hover:text-white">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://znelnyiupddbelcsuvns.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeUser = null;
        let allMembers = [];

        async function login() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;

            const { data, error } = await _supabase
                .from('network_members')
                .select('*')
                .eq('email', email)
                .eq('password', pass)
                .single();

            if (data) {
                activeUser = data;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-name').innerText = data.full_name;
                document.getElementById('user-id-display').innerText = data.associate_id;
                notify("Access Granted", "green");
                loadCards();
            } else {
                notify("Invalid Credentials", "red");
            }
        }

        async function loadCards() {
            const { data } = await _supabase
                .from('network_members')
                .select('*')
                .eq('sponsor_id', activeUser.associate_id);

            allMembers = data || [];
            renderCards(allMembers);
        }

        function renderCards(list) {
            const grid = document.getElementById('cards-grid');
            document.getElementById('member-count').innerText = `${list.length} Members`;
            grid.innerHTML = '';

            list.forEach(m => {
                const card = document.createElement('div');
                card.className = "glass p-6 rounded-2xl cursor-pointer border border-transparent card-anim";
                card.onclick = () => showMember(m);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded font-mono">${m.associate_id}</span>
                        <span class="text-[10px] text-gray-500">${m.registration_date}</span>
                    </div>
                    <h4 class="text-lg font-bold text-white">${m.full_name}</h4>
                    <p class="text-blue-400 text-xs font-black uppercase mt-1 tracking-wider">${m.level}</p>
                `;
                grid.appendChild(card);
            });
        }

        function filterCards() {
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();
            const filterLevel = document.getElementById('filter-level').value;

            const filtered = allMembers.filter(m => {
                const matchesSearch = m.full_name.toLowerCase().includes(searchTerm) || 
                                     m.email.toLowerCase().includes(searchTerm) || 
                                     m.associate_id.toLowerCase().includes(searchTerm);
                
                const matchesLevel = filterLevel === "All" || m.level === filterLevel;
                
                return matchesSearch && matchesLevel;
            });

            renderCards(filtered);
        }

        function showMember(m) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <div class="h-12 w-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-xl text-white">
                        ${m.full_name.charAt(0)}
                    </div>
                    <div>
                        <h2 class="text-2xl font-black">${m.full_name}</h2>
                        <p class="text-blue-500 text-xs font-bold uppercase">${m.level}</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mb-8">
                    ${row("Email", m.email)}
                    <div class="bg-white/5 p-3 rounded-lg flex justify-between items-center group relative">
                        <div>
                            <p class="text-[10px] text-gray-500 uppercase">Password</p>
                            <input type="password" value="${m.password}" id="modal-p" class="bg-transparent border-none outline-none font-medium w-full" readonly>
                        </div>
                        <button onclick="togglePass('modal-p', this)" class="text-blue-400 text-[10px] font-bold">SHOW</button>
                    </div>
                    ${row("Phone", m.phone_no)}
                    ${row("Associate ID", m.associate_id)}
                    ${row("Sponsor Name", m.sponsor_name || "Self")}
                    ${row("Business ID", m.sponsor_business_id ? "✅ Yes" : "❌ No")}
                </div>
                <div class="flex gap-3 border-t border-white/5 pt-6">
                    <button class="bg-blue-600 flex-1 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Edit Details</button>
                    <button onclick="closeModal()" class="bg-white/10 px-6 py-3 rounded-xl font-bold">Close</button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function row(label, val) {
            return `
                <div class="bg-white/5 p-3 rounded-lg group">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">${label}</p>
                    <div class="flex justify-between items-center">
                        <span class="font-medium">${val || 'N/A'}</span>
                        <button onclick="copy('${val}')" class="text-blue-400 text-[10px] underline opacity-0 group-hover:opacity-100 transition">Copy</button>
                    </div>
                </div>
            `;
        }

        async function saveMember() {
            const payload = {
                full_name: document.getElementById('f-name').value,
                sponsor_name: document.getElementById('f-sponsor-name').value,
                email: document.getElementById('f-email').value,
                password: document.getElementById('f-pass').value,
                phone_no: document.getElementById('f-phone').value,
                associate_id: document.getElementById('f-assoc').value,
                level: document.getElementById('f-level').value,
                sponsor_business_id: document.getElementById('f-biz').checked,
                sponsor_id: activeUser.associate_id
            };

            const { error } = await _supabase.from('network_members').insert([payload]);
            if (!error) {
                notify("Member Saved Successfully!", "green");
                loadCards();
            } else {
                notify("Error: ID already exists!", "red");
            }
        }

        function togglePass(inputId, btn) {
            const el = document.getElementById(inputId);
            if (el.type === 'password') {
                el.type = 'text';
                btn.innerText = 'HIDE';
            } else {
                el.type = 'password';
                btn.innerText = 'SHOW';
            }
        }

        function copy(t) {
            navigator.clipboard.writeText(t);
            notify("Copied to clipboard!");
        }

        function notify(msg, col) {
            const t = document.getElementById('toast');
            t.className = `fixed top-5 right-5 px-6 py-3 rounded-xl shadow-2xl z-[100] text-white font-bold transition-all ${col === 'red' ? 'bg-red-600' : 'bg-blue-600'}`;
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
