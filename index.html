<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Vault | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-dark { background: #111; border: 1px solid #222; color: white; padding: 14px; border-radius: 12px; width: 100%; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .card-self { border: 1px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="toast" class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl shadow-2xl z-[100] text-white font-black"></div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-4xl font-black mb-8 text-center text-white tracking-tighter">Login</h2>
            <div class="space-y-5">
                <input type="email" id="l-email" placeholder="Email Address" class="input-dark">
                <div class="relative">
                    <input type="password" id="l-pass" placeholder="Password" class="input-dark">
                    <button onclick="togglePass('l-pass', this)" class="absolute right-4 top-4 text-[10px] text-blue-500 font-black uppercase tracking-widest">Show</button>
                </div>
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-black mt-6 transition-all active:scale-95 shadow-lg shadow-blue-900/30">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-8">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-xl" id="initials">?</div>
                <div>
                    <h1 class="text-2xl font-black"><span id="user-name"></span> <span class="text-blue-500 text-sm ml-1">(You)</span></h1>
                    <p id="user-level" class="text-blue-500 text-[10px] font-black uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-full border border-red-500/20 font-bold hover:bg-red-500 transition">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass p-8 rounded-3xl h-fit border-t-4 border-blue-600">
                <h3 class="text-xl font-black mb-6">Add New Member</h3>
                <div class="space-y-4">
                    <input type="text" id="f-name" placeholder="Full Name" class="input-dark">
                    <input type="text" id="f-sponsor-name" placeholder="Sponsor Name" class="input-dark">
                    <input type="email" id="f-email" placeholder="Email" class="input-dark">
                    <input type="text" id="f-pass" placeholder="Password" class="input-dark">
                    <input type="text" id="f-phone" placeholder="Phone" class="input-dark">
                    <input type="text" id="f-assoc" placeholder="Associate ID" class="input-dark">
                    <select id="f-level" class="input-dark font-bold text-sm">
                        <option value="25%">25%</option>
                        <option value="35%">35%</option>
                        <option value="42%">42%</option>
                        <option value="50%(Supervisior)">50% (Supervisor)</option>
                        <option value="World Team">World Team</option>
                        <option value="GET Team">GET Team</option>
                        <option value="President Team">President Team</option>
                    </select>
                    <label class="flex items-center space-x-3 p-4 bg-white/5 rounded-xl cursor-pointer">
                        <input type="checkbox" id="f-biz" class="w-6 h-6 accent-blue-600">
                        <span class="text-sm font-bold text-gray-400">Business ID Active</span>
                    </label>
                    <button onclick="saveMember()" class="w-full bg-blue-600 p-4 rounded-xl font-black mt-4 shadow-lg shadow-blue-900/20">Create Card</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="relative mb-8">
                    <input type="text" id="search-input" oninput="doSearch()" placeholder="Search Name or Associate ID..." class="input-dark h-16 pl-14 text-lg">
                    <span class="absolute left-5 top-5 opacity-20 text-2xl">🔍</span>
                </div>
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="glass w-full max-w-xl p-8 rounded-[2.5rem] relative shadow-3xl animate-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-3xl text-gray-500 hover:text-white">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://znelnyiupddbelcsuvns.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeUser = null;
        let networkData = [];

        window.onload = () => {
            const session = localStorage.getItem('vault_session');
            if (session) {
                activeUser = JSON.parse(session);
                showDashboard();
            }
        };

        async function login() {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value.trim();
            const { data } = await _supabase.from('network_members').select('*').eq('email', email).eq('password', pass);
            if (data && data.length > 0) {
                activeUser = data[0];
                localStorage.setItem('vault_session', JSON.stringify(activeUser));
                showDashboard();
            } else { notify("Invalid Credentials!", "red"); }
        }

        function showDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-name').innerText = activeUser.full_name;
            document.getElementById('user-level').innerText = activeUser.level;
            document.getElementById('initials').innerText = activeUser.full_name.charAt(0);
            loadAllCards();
        }

        async function loadAllCards() {
            const { data } = await _supabase.from('network_members').select('*');
            networkData = data || [];
            renderCards(networkData);
        }

        function renderCards(list) {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            list.forEach(m => {
                const isMe = m.associate_id === activeUser.associate_id;
                const div = document.createElement('div');
                div.className = `glass p-6 rounded-2xl border transition-all cursor-pointer ${isMe ? 'card-self' : 'border-transparent hover:border-white/10'}`;
                div.onclick = () => openDetails(m);
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-mono text-gray-500 bg-white/5 px-2 py-0.5 rounded">${m.associate_id}</span>
                        ${isMe ? '<span class="text-[9px] bg-blue-600 px-2 py-0.5 rounded-full font-black text-white">YOU</span>' : ''}
                    </div>
                    <h4 class="text-lg font-bold mt-3">${m.full_name}</h4>
                    <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest mt-1">${m.level}</p>
                `;
                grid.appendChild(div);
            });
        }

        function openDetails(m) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            const isMe = m.associate_id === activeUser.associate_id;

            body.innerHTML = `
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-16 w-16 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl font-black">${m.full_name.charAt(0)}</div>
                    <div>
                        <h2 class="text-2xl font-black">${m.full_name} ${isMe ? '<span class="text-blue-500 text-sm">(You)</span>' : ''}</h2>
                        <p class="text-blue-500 text-xs font-black uppercase tracking-widest">${m.level}</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    ${detailBox("Email Address", m.email)}
                    <div class="bg-white/5 p-4 rounded-xl relative">
                        <p class="text-[10px] text-gray-500 uppercase font-black mb-1">Password</p>
                        <div class="flex justify-between">
                            <input type="password" value="${m.password}" id="modal-p" class="bg-transparent border-none outline-none font-bold text-white w-full" readonly>
                            <button onclick="togglePass('modal-p', this)" class="text-[10px] text-blue-500 font-black">SHOW</button>
                        </div>
                    </div>
                    ${detailBox("Phone No", m.phone_no)}
                    ${detailBox("Associate ID", m.associate_id)}
                    ${detailBox("Sponsor Name", m.sponsor_name || "N/A")}
                    ${detailBox("Business ID Status", m.sponsor_business_id ? "Active ✅" : "Inactive ❌")}
                </div>
                <div class="flex gap-4">
                    <button class="bg-blue-600 flex-1 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-blue-700 transition">Edit Credentials</button>
                    <button onclick="closeModal()" class="bg-white/10 px-8 py-4 rounded-2xl font-black text-sm uppercase">Close</button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function detailBox(label, value) {
            return `
                <div class="bg-white/5 p-4 rounded-xl">
                    <p class="text-[10px] text-gray-500 uppercase font-black mb-1 tracking-widest">${label}</p>
                    <p class="font-bold text-white truncate">${value || 'Not Set'}</p>
                </div>
            `;
        }

        function doSearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = networkData.filter(m => m.full_name.toLowerCase().includes(term) || m.associate_id.toLowerCase().includes(term));
            renderCards(filtered);
        }

        async function saveMember() {
            const payload = {
                full_name: document.getElementById('f-name').value,
                sponsor_name: document.getElementById('f-sponsor-name').value,
                email: document.getElementById('f-email').value,
                password: document.getElementById('f-pass').value,
                phone_no: document.getElementById('f-phone').value,
                associate_id: document.getElementById('f-assoc').value,
                level: document.getElementById('f-level').value,
                sponsor_business_id: document.getElementById('f-biz').checked
            };
            const { error } = await _supabase.from('network_members').insert([payload]);
            if (!error) { notify("Member Added Successfully!", "blue"); loadAllCards(); }
            else { notify("Error: ID already exists!", "red"); }
        }

        function togglePass(id, btn) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
            btn.innerText = el.type === 'password' ? 'SHOW' : 'HIDE';
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('vault_session'); location.reload(); }
        function notify(msg, col) {
            const t = document.getElementById('toast');
            t.className = `fixed top-5 right-5 px-6 py-3 rounded-xl z-[100] text-white font-black ${col === 'red' ? 'bg-red-600' : 'bg-blue-600'}`;
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
