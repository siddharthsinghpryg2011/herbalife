<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Vault | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-dark { background: #111; border: 1px solid #222; color: white; padding: 14px; border-radius: 12px; width: 100%; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .card-self { border: 1px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="toast" class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl shadow-2xl z-[100] text-white font-bold"></div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-4xl font-black mb-8 text-center text-white tracking-tighter">Login</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="text-xs text-gray-500 font-bold uppercase ml-1">Email Address</label>
                    <input type="email" id="l-email" placeholder="example@gmail.com" class="input-dark mt-1">
                </div>
                
                <div class="relative">
                    <label class="text-xs text-gray-500 font-bold uppercase ml-1">Password</label>
                    <input type="password" id="l-pass" placeholder="••••••••" class="input-dark mt-1">
                    <button onclick="togglePass('l-pass', this)" class="absolute right-4 top-10 text-[10px] text-blue-500 font-black uppercase tracking-widest">Show</button>
                </div>

                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-black mt-6 transition-all active:scale-95 shadow-lg shadow-blue-900/30">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-8">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-xl" id="initials">?</div>
                <div>
                    <h1 class="text-2xl font-black"><span id="user-name"></span> <span class="text-blue-500 text-sm ml-1">(You)</span></h1>
                    <p id="user-level" class="text-blue-500 text-[10px] font-black uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-full border border-red-500/20 font-bold hover:bg-red-500 hover:text-white transition">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass p-8 rounded-3xl h-fit border-t-4 border-blue-600">
                <h3 class="text-xl font-black mb-6">Add New Member</h3>
                <div class="space-y-4">
                    <input type="text" id="f-name" placeholder="Full Name" class="input-dark">
                    <input type="text" id="f-sponsor-name" placeholder="Sponsor Name" class="input-dark">
                    <input type="email" id="f-email" placeholder="Email" class="input-dark">
                    <input type="text" id="f-pass" placeholder="Password" class="input-dark">
                    <input type="text" id="f-phone" placeholder="Phone" class="input-dark">
                    <input type="text" id="f-assoc" placeholder="Associate ID" class="input-dark">
                    <select id="f-level" class="input-dark font-bold text-sm">
                        <option value="World Team">World Team</option>
                        <option value="Supervisor">Supervisor</option>
                        <option value="GET Team">GET Team</option>
                        <option value="President Team">President Team</option>
                        <option value="25%">25%</option>
                        <option value="35%">35%</option>
                        <option value="42%">42%</option>
                    </select>
                    <label class="flex items-center space-x-3 p-4 bg-white/5 rounded-xl cursor-pointer hover:bg-white/10 transition">
                        <input type="checkbox" id="f-biz" class="w-6 h-6 accent-blue-600">
                        <span class="text-sm font-bold">Business ID Active</span>
                    </label>
                    <button onclick="saveMember()" class="w-full bg-blue-600 p-4 rounded-xl font-black mt-4 shadow-lg shadow-blue-900/20">Create Card</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="relative mb-8">
                    <input type="text" id="search-input" oninput="doSearch()" placeholder="Search Name or Associate ID..." class="input-dark h-16 pl-14 text-lg">
                    <span class="absolute left-5 top-5 opacity-20 text-2xl">🔍</span>
                </div>
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://znelnyiupddbelcsuvns.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeUser = null;
        let networkData = [];

        window.onload = () => {
            const session = localStorage.getItem('vault_session');
            if (session) {
                activeUser = JSON.parse(session);
                showDashboard();
            }
        };

        async function login() {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value.trim();

            if(!email || !pass) return notify("Please fill all fields", "red");

            // Logic fix: Exact match checking
            const { data, error } = await _supabase
                .from('network_members')
                .select('*')
                .eq('email', email)
                .eq('password', pass)
                .maybeSingle();

            if (data) {
                activeUser = data;
                localStorage.setItem('vault_session', JSON.stringify(data));
                showDashboard();
                notify("Login Success", "blue");
            } else {
                notify("Invalid Email or Password!", "red");
            }
        }

        function showDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-name').innerText = activeUser.full_name;
            document.getElementById('user-level').innerText = activeUser.level;
            document.getElementById('initials').innerText = activeUser.full_name.charAt(0);
            loadAllCards();
        }

        async function loadAllCards() {
            const { data } = await _supabase.from('network_members').select('*');
            networkData = data || [];
            renderCards(networkData);
        }

        function renderCards(list) {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            list.forEach(m => {
                const isMe = m.associate_id === activeUser.associate_id;
                const div = document.createElement('div');
                div.className = `glass p-6 rounded-2xl border transition-all cursor-pointer ${isMe ? 'card-self' : 'border-transparent hover:border-white/10'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-mono text-gray-500 bg-white/5 px-2 py-0.5 rounded">${m.associate_id}</span>
                        ${isMe ? '<span class="text-[9px] bg-blue-600 px-2 py-0.5 rounded-full font-black text-white">YOU</span>' : ''}
                    </div>
                    <h4 class="text-lg font-bold mt-3">${m.full_name}</h4>
                    <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest mt-1">${m.level}</p>
                `;
                grid.appendChild(div);
            });
        }

        function doSearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = networkData.filter(m => 
                m.full_name.toLowerCase().includes(term) || 
                m.associate_id.toLowerCase().includes(term)
            );
            renderCards(filtered);
        }

        async function saveMember() {
            const payload = {
                full_name: document.getElementById('f-name').value,
                sponsor_name: document.getElementById('f-sponsor-name').value,
                email: document.getElementById('f-email').value,
                password: document.getElementById('f-pass').value,
                phone_no: document.getElementById('f-phone').value,
                associate_id: document.getElementById('f-assoc').value,
                level: document.getElementById('f-level').value,
                sponsor_business_id: document.getElementById('f-biz').checked
            };
            const { error } = await _supabase.from('network_members').insert([payload]);
            if (!error) { notify("Card Created!"); loadAllCards(); }
            else { notify("Error: ID already exists!", "red"); }
        }

        function togglePass(id, btn) {
            const el = document.getElementById(id);
            if (el.type === 'password') {
                el.type = 'text';
                btn.innerText = 'Hide';
            } else {
                el.type = 'password';
                btn.innerText = 'Show';
            }
        }

        function logout() { localStorage.removeItem('vault_session'); location.reload(); }
        
        function notify(msg, col) {
            const t = document.getElementById('toast');
            t.className = `fixed top-5 right-5 px-6 py-3 rounded-xl z-[100] text-white font-black shadow-2xl ${col === 'red' ? 'bg-red-600' : 'bg-blue-600'}`;
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
