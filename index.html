<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Vault | Copy Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --accent: #3b82f6; --bg: #050505; --card: #111; }
        body { background-color: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #tree-viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #tree-viewport:active { cursor: grabbing; }
        #drag-container { position: absolute; transform-origin: center; transition: transform 0.1s ease-out; }
        .tree ul { padding-top: 40px; position: relative; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 40px 15px 0 15px; }
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid #333; width: 50%; height: 40px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #333; }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::after { border-radius: 10px 0 0 0; }
        .tree li:last-child::before { border-right: 2px solid #333; border-radius: 0 10px 0 0; }
        .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid #333; width: 0; height: 40px; }
        .node-card { background: var(--card); border: 2px solid #222; padding: 20px; border-radius: 20px; display: inline-block; min-width: 180px; max-width: 220px; cursor: pointer; transition: 0.3s; }
        .node-card:hover { border-color: var(--accent); transform: scale(1.05); }
        .active-user { border-color: var(--accent); background: #001e4d; box-shadow: 0 0 30px rgba(59,130,246,0.3); }
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        input, select { background: #000 !important; color: white !important; border: 1px solid #333 !important; }
        .hidden { display: none !important; }
        .action-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; width: 90%; max-width: 500px; }
        .copy-btn { padding: 8px; border-radius: 10px; background: rgba(255,255,255,0.05); transition: 0.2s; }
        .copy-btn:active { transform: scale(0.9); background: var(--accent); }
    </style>
</head>
<body>

    <div id="search-bar" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-[600px] hidden">
        <div class="relative">
            <input type="text" id="tree-search" oninput="handleSearch()" placeholder="Search members..." class="w-full p-4 pl-12 rounded-2xl shadow-2xl outline-none backdrop-blur-md bg-black/50">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i>
        </div>
    </div>

    <div id="login-box" class="fixed inset-0 bg-black flex items-center justify-center z-[500] p-6">
        <div class="bg-[#111] p-8 rounded-[2.5rem] w-full max-w-md border border-white/10 text-center">
            <h2 class="text-3xl font-black mb-8 text-blue-500 italic uppercase">Vault Login</h2>
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="Email" class="w-full p-4 rounded-xl outline-none border border-white/10">
                <input type="password" id="l-pass" placeholder="Password" class="w-full p-4 rounded-xl outline-none border border-white/10">
                <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xl hover:bg-blue-700 transition">Access Database</button>
            </div>
        </div>
    </div>

    <div id="tree-viewer" class="hidden"><div id="tree-viewport"><div id="drag-container" class="tree"><div id="tree-container"></div></div></div></div>
    <div id="search-results-view" class="hidden fixed inset-0 bg-black z-50 overflow-y-auto pt-28 px-6"><div id="search-results-container" class="max-w-2xl mx-auto space-y-4 pb-20"></div></div>

    <div class="action-dock hidden" id="ui-actions">
        <button onclick="openAddForm()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-xl"><i data-lucide="user-plus" class="w-5 h-5"></i> ADD MEMBER</button>
        <button onclick="logout()" class="w-16 h-14 bg-white/10 text-white rounded-2xl flex items-center justify-center border border-white/10"><i data-lucide="log-out" class="w-6 h-6"></i></button>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-[1000] flex items-center justify-center p-4 backdrop-blur-xl overflow-y-auto">
        <div class="bg-[#111] w-full max-w-2xl p-6 md:p-10 rounded-[3rem] border border-white/10 my-auto relative" id="modal-inner"></div>
    </div>

    <script>
        const SB_URL = 'https://znelnyiupddbelcsuvns.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let activeUser = null, members = [], isDragging = false, startX, startY, translateX = 0, translateY = 0;
        const levels = ["25%", "35% (Senior Consultant)", "42% (Success Builder)", "50% (Supervisor)", "World Team", "Active World Team", "GET Team", "GET 2500 Team", "Millionaire Team", "Millionaire 7500 Team", "President Team"];

        async function login() {
            const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
            const { data } = await _supabase.from('network_members').select('*').eq('email', e).eq('password', p).single();
            if(data) { activeUser = data; localStorage.setItem('vault_user', JSON.stringify(activeUser)); showApp(); }
            else alert("Invalid Credentials");
        }

        function showApp() {
            document.getElementById('login-box').classList.add('hidden');
            ["tree-viewer", "ui-actions", "search-bar"].forEach(id => document.getElementById(id).classList.remove('hidden'));
            refreshTree(); initDraggable();
        }

        async function refreshTree() {
            const { data } = await _supabase.from('network_members').select('*');
            members = data || [];
            const user = members.find(m => m.id === activeUser.id) || activeUser;
            document.getElementById('tree-container').innerHTML = `<ul>${nodeToHTML(user)}</ul>`;
            lucide.createIcons();
        }

        function nodeToHTML(user) {
            const children = members.filter(m => String(m.sponsor_name).trim().toLowerCase() === String(user.full_name).trim().toLowerCase() && String(m.sponsor_phone).trim() === String(user.phone_no).trim());
            let html = `<li><div class="node-card ${user.id === activeUser.id ? 'active-user' : ''}" onclick='showDetails(${JSON.stringify(user)})'><p class="text-[10px] font-black text-blue-400 uppercase truncate-text">${user.level || '25%'}</p><p class="text-lg font-black mt-1 truncate-text">${user.full_name}</p><p class="text-[10px] opacity-40 truncate-text">${user.associate_id}</p></div>`;
            if(children.length > 0) html += `<ul>${children.map(c => nodeToHTML(c)).join('')}</ul>`;
            return html + `</li>`;
        }

        function showDetails(user) {
            const inner = document.getElementById('modal-inner');
            inner.innerHTML = `
                <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500"><i data-lucide="x"></i></button>
                <div class="flex flex-col items-center mb-8">
                    ${user.photo_url ? `<img src="${user.photo_url}" class="w-24 h-24 rounded-full border-4 border-blue-500 object-cover">` : `<div class="w-24 h-24 bg-gray-900 rounded-full flex items-center justify-center border-2 border-gray-800"><i data-lucide="user" class="text-gray-700"></i></div>`}
                    <h2 class="text-3xl font-black mt-4 text-center truncate-text">${user.full_name}</h2>
                    <span class="text-blue-400 text-xs font-black uppercase mt-1 tracking-widest">${user.level}</span>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
                    ${detailRow("ID", user.associate_id, "id-card")}
                    ${detailRow("Phone", user.phone_no, "phone")}
                    ${detailRow("Email", user.email, "mail", true)}
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <i data-lucide="lock" class="w-4 h-4 text-blue-500 shrink-0"></i>
                            <p class="text-sm font-bold truncate-text" id="det-pass">••••••••</p>
                        </div>
                        <div class="flex gap-2">
                            <i data-lucide="eye" class="w-4 h-4 text-gray-500 cursor-pointer" onclick="toggleDetPass('${user.password}')"></i>
                            <button onclick="copyToClipboard('${user.password}', this)" class="copy-btn"><i data-lucide="copy" class="w-3.5 h-3.5 text-gray-400"></i></button>
                        </div>
                    </div>
                    <div class="sm:col-span-2 space-y-3">
                        <div class="text-[10px] text-blue-500 font-black uppercase tracking-widest ml-2">Upline Info</div>
                        ${detailRow("Sponsor Name", user.sponsor_name, "user")}
                        ${detailRow("Sponsor Phone", user.sponsor_phone, "contact")}
                    </div>
                </div>
                <div class="flex gap-3"><button class="flex-[2] bg-blue-600 py-5 rounded-2xl font-black" onclick='openEditForm(${JSON.stringify(user)})'>EDIT PROFILE</button><button class="flex-1 bg-white/10 py-5 rounded-2xl font-black" onclick="closeModal()">CLOSE</button></div>`;
            document.getElementById('modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function detailRow(label, value, icon, trunc = false) {
            return `
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center justify-between overflow-hidden">
                <div class="flex items-center gap-3 overflow-hidden">
                    <i data-lucide="${icon}" class="w-4 h-4 text-blue-500 shrink-0"></i>
                    <div class="overflow-hidden">
                        <p class="text-[9px] text-gray-500 uppercase font-bold">${label}</p>
                        <p class="text-sm font-bold text-gray-100 ${trunc ? 'truncate-text' : ''}">${value || 'N/A'}</p>
                    </div>
                </div>
                <button onclick="copyToClipboard('${value}', this)" class="copy-btn shrink-0 ml-2">
                    <i data-lucide="copy" class="w-3.5 h-3.5 text-gray-400"></i>
                </button>
            </div>`;
        }

        async function copyToClipboard(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                const icon = btn.querySelector('i');
                const originalIcon = icon.getAttribute('data-lucide');
                icon.setAttribute('data-lucide', 'check');
                icon.classList.replace('text-gray-400', 'text-green-400');
                lucide.createIcons();
                setTimeout(() => {
                    icon.setAttribute('data-lucide', originalIcon);
                    icon.classList.replace('text-green-400', 'text-gray-400');
                    lucide.createIcons();
                }, 2000);
            } catch (err) { console.error('Failed to copy!', err); }
        }

        function initDraggable() {
            const viewport = document.getElementById('tree-viewport');
            const container = document.getElementById('drag-container');
            viewport.addEventListener('mousedown', (e) => { isDragging = true; startX = e.pageX - translateX; startY = e.pageY - translateY; });
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => { if (!isDragging) return; translateX = e.pageX - startX; translateY = e.pageY - startY; container.style.transform = `translate(${translateX}px, ${translateY}px)`; });
            viewport.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].pageX - translateX; startY = e.touches[0].pageY - translateY; });
            viewport.addEventListener('touchend', () => isDragging = false);
            viewport.addEventListener('touchmove', (e) => { if (!isDragging) return; translateX = e.touches[0].pageX - startX; translateY = e.touches[0].pageY - startY; container.style.transform = `translate(${translateX}px, ${translateY}px)`; });
        }

        function renderForm(user = null) {
            const inner = document.getElementById('modal-inner');
            inner.innerHTML = `<h2 class="text-2xl font-black mb-6 text-center">${user ? 'EDIT MEMBER' : 'NEW REGISTRATION'}</h2><div class="space-y-3"><input id="f-name" placeholder="Full Name" value="${user?.full_name || ''}" class="w-full p-4 rounded-xl outline-none"><div class="grid grid-cols-2 gap-3"><input id="f-assoc" placeholder="ID" value="${user?.associate_id || ''}" class="p-4 rounded-xl outline-none"><input id="f-phone" placeholder="Phone" value="${user?.phone_no || ''}" class="p-4 rounded-xl outline-none"></div><input id="f-email" placeholder="Email" value="${user?.email || ''}" class="w-full p-4 rounded-xl outline-none"><div class="grid grid-cols-2 gap-3"><input id="f-pass" type="password" placeholder="Password" value="${user?.password || ''}" class="p-4 rounded-xl outline-none"><select id="f-level" class="p-4 rounded-xl outline-none">${levels.map(l => `<option value="${l}" ${user?.level === l ? 'selected' : ''}>${l}</option>`).join('')}</select></div><div class="p-4 bg-blue-600/5 rounded-2xl border border-blue-500/20 space-y-3"><p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Sponsor Verification</p><input id="f-sp-name" placeholder="Sponsor Name" value="${user?.sponsor_name || ''}" class="w-full p-3 rounded-xl outline-none bg-black"><input id="f-sp-phone" placeholder="Sponsor Phone" value="${user?.sponsor_phone || ''}" class="w-full p-3 rounded-xl outline-none bg-black"></div><div class="flex gap-3 pt-4"><button onclick="${user ? `saveUpdate('${user.id}')` : 'saveNewMember()'}" class="flex-[2] bg-blue-600 p-4 rounded-xl font-black">SAVE</button><button onclick="closeModal()" class="flex-1 bg-white/10 p-4 rounded-xl font-black">CANCEL</button></div></div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        }

        async function saveUpdate(id) {
            const p = getFields();
            const { data } = await _supabase.from('network_members').select('id').eq('full_name', p.sponsor_name).eq('phone_no', p.sponsor_phone);
            if(data.length === 0) return alert("Sponsor Not Found!");
            const { error } = await _supabase.from('network_members').update(p).eq('id', id);
            if(!error) { closeModal(); await refreshTree(); alert("Updated!"); }
        }

        async function saveNewMember() {
            const p = getFields();
            const { data } = await _supabase.from('network_members').select('id').eq('full_name', p.sponsor_name).eq('phone_no', p.sponsor_phone);
            if(data.length === 0) return alert("Sponsor Not Found!");
            const { error } = await _supabase.from('network_members').insert([p]);
            if(!error) { closeModal(); await refreshTree(); alert("Registered!"); }
        }

        function getFields() { return { full_name: document.getElementById('f-name').value.trim(), associate_id: document.getElementById('f-assoc').value.trim(), phone_no: document.getElementById('f-phone').value.trim(), email: document.getElementById('f-email').value.trim(), password: document.getElementById('f-pass').value.trim(), level: document.getElementById('f-level').value, sponsor_name: document.getElementById('f-sp-name').value.trim(), sponsor_phone: document.getElementById('f-sp-phone').value.trim() }; }
        function handleSearch() { const q = document.getElementById('tree-search').value.toLowerCase().trim(); const resV = document.getElementById('search-results-view'); if(!q) { resV.classList.add('hidden'); return; } resV.classList.remove('hidden'); const filtered = members.filter(m => m.full_name.toLowerCase().includes(q) || m.associate_id.toLowerCase().includes(q)); document.getElementById('search-results-container').innerHTML = filtered.map(m => `<div class="bg-[#111] p-4 rounded-2xl border border-white/5 flex justify-between items-center" onclick='showDetails(${JSON.stringify(m)})'><div><p class="text-blue-500 text-[10px] font-black">${m.level}</p><p class="font-bold text-lg">${m.full_name}</p></div><i data-lucide="chevron-right" class="text-gray-600"></i></div>`).join(''); lucide.createIcons(); }
        function toggleDetPass(pass) { const p = document.getElementById('det-pass'); p.innerText = p.innerText === '••••••••' ? pass : '••••••••'; }
        function openAddForm() { renderForm(); }
        function openEditForm(user) { renderForm(user); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('vault_user'); location.reload(); }
        window.onload = () => { if(localStorage.getItem('vault_user')) { activeUser = JSON.parse(localStorage.getItem('vault_user')); showApp(); } };
    </script>
</body>
</html>
