<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Vault | Level Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-dark { background: #111; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        .card-self { border: 1px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .level-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 900; margin-bottom: 8px; display: inline-block; }
        .copy-btn { font-size: 9px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="toast" class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl z-[100] text-white font-bold"></div>

    <div id="dashboard" class="hidden p-6 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-8">
            <div class="flex items-center gap-4">
                <div class="h-14 w-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl" id="initials">?</div>
                <div>
                    <h1 class="text-2xl font-black"><span id="user-name"></span> <span class="text-blue-500 text-sm ml-1">(Rank 1)</span></h1>
                    <p id="user-level" class="text-blue-500 text-[10px] font-black uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-xl border border-red-500/20 font-bold hover:bg-red-500 transition">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass p-8 rounded-3xl h-fit border-t-4 border-blue-600">
                <h3 class="text-xl font-black mb-6" id="form-title">Add Downline</h3>
                <div class="space-y-3">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="f-name" placeholder="Full Name" class="input-dark">
                    <input type="text" id="f-sponsor-name" placeholder="Sponsor Name" class="input-dark">
                    <input type="email" id="f-email" placeholder="Email" class="input-dark">
                    <input type="password" id="f-pass" placeholder="Password" class="input-dark">
                    <input type="text" id="f-phone" placeholder="Phone" class="input-dark">
                    <input type="text" id="f-assoc" placeholder="Associate ID" class="input-dark">
                    <select id="f-level" class="input-dark font-bold text-sm">
                        <option value="World Team">World Team</option>
                        <option value="GET Team">GET Team</option>
                        <option value="President Team">President Team</option>
                        <option value="25%">25%</option>
                        <option value="35%">35%</option>
                        <option value="42%">42%</option>
                        <option value="50%(Supervisior)">50% (Supervisor)</option>
                    </select>
                    <button onclick="saveMember()" id="save-btn" class="w-full bg-blue-600 p-4 rounded-xl font-black mt-4">Create Card</button>
                    <button onclick="resetForm()" id="cancel-btn" class="hidden w-full bg-white/5 p-4 rounded-xl font-bold mt-2">Cancel Edit</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="mb-6 flex justify-between items-center">
                    <h3 class="text-lg font-black text-gray-500 uppercase tracking-widest">Network Hierarchy</h3>
                    <span id="team-count" class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-black"></span>
                </div>
                <input type="text" id="tree-search" oninput="doSearch()" placeholder="Search in your team..." class="input-dark mb-6 h-14">
                
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-50 flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="glass w-full max-w-lg p-8 rounded-[2.5rem] relative">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-3xl text-gray-400">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md">
            <h2 class="text-4xl font-black mb-8 text-center uppercase tracking-tighter">Login</h2>
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="Email" class="input-dark">
                <input type="password" id="l-pass" placeholder="Password" class="input-dark">
                <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-xl font-black mt-4 transition-all">Sign In</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://znelnyiupddbelcsuvns.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeUser = null;
        let myFullTree = [];

        window.onload = () => {
            const session = localStorage.getItem('vault_session');
            if (session) {
                activeUser = JSON.parse(session);
                showDashboard();
            }
        };

        async function login() {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value.trim();
            const { data } = await _supabase.from('network_members').select('*').eq('email', email).eq('password', pass);
            if (data && data.length > 0) {
                activeUser = data[0];
                localStorage.setItem('vault_session', JSON.stringify(activeUser));
                showDashboard();
            } else { notify("Access Denied!", "red"); }
        }

        function showDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-name').innerText = activeUser.full_name;
            document.getElementById('user-level').innerText = activeUser.level;
            document.getElementById('initials').innerText = activeUser.full_name.charAt(0);
            loadTree();
        }

        async function loadTree() {
            const { data } = await _supabase.from('network_members').select('*');
            
            // Logic: Recursive hierarchy building
            // Assigning ranks: Me = Rank 1, My Children = Rank 2, etc.
            const buildTree = (list, parentId, currentRank) => {
                let team = [];
                let children = list.filter(m => m.sponsor_id === parentId);
                
                children.forEach(child => {
                    child.computedRank = currentRank;
                    team.push(child);
                    // Get grandchildren
                    team = team.concat(buildTree(list, child.associate_id, currentRank + 1));
                });
                return team;
            };

            const downlines = buildTree(data, activeUser.associate_id, 2);
            activeUser.computedRank = 1;
            myFullTree = [activeUser, ...downlines];
            
            document.getElementById('team-count').innerText = `${myFullTree.length} TOTAL IN TREE`;
            renderCards(myFullTree);
        }

        function renderCards(list) {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            list.forEach(m => {
                const isMe = m.associate_id === activeUser.associate_id;
                const div = document.createElement('div');
                div.className = `glass p-6 rounded-2xl border transition-all cursor-pointer ${isMe ? 'card-self' : 'border-transparent hover:border-white/10'}`;
                div.onclick = () => openDetails(m);
                
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="level-badge ${isMe ? 'bg-blue-600' : 'bg-white/10 text-gray-400'}">RANK ${m.computedRank}</span>
                        <span class="text-[9px] font-mono opacity-50">${m.associate_id}</span>
                    </div>
                    <h4 class="text-lg font-black">${m.full_name} ${isMe ? '<span class="text-blue-500 text-xs ml-1">(You)</span>' : ''}</h4>
                    <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest mt-1">${m.level}</p>
                `;
                grid.appendChild(div);
            });
        }

        function openDetails(m) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div class="h-14 w-14 bg-blue-600 rounded-xl flex items-center justify-center text-2xl font-black">${m.full_name.charAt(0)}</div>
                    <div>
                        <h2 class="text-xl font-black">${m.full_name}</h2>
                        <p class="text-blue-500 text-[10px] font-black uppercase">Rank ${m.computedRank} • ${m.level}</p>
                    </div>
                </div>
                <div class="space-y-3 mb-8">
                    ${detailBox("Email", m.email)}
                    ${detailBox("Password", m.password)}
                    ${detailBox("Phone", m.phone_no)}
                    ${detailBox("Associate ID", m.associate_id)}
                    ${detailBox("Sponsor", m.sponsor_name)}
                </div>
                <div class="flex gap-3">
                    <button onclick='startEdit(${JSON.stringify(m)})' class="bg-blue-600 flex-1 py-3 rounded-xl font-black text-xs uppercase">Edit Member</button>
                    <button onclick="closeModal()" class="bg-white/10 px-6 py-3 rounded-xl font-black text-xs uppercase">Close</button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function detailBox(label, val) {
            return `
                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center">
                    <div class="truncate">
                        <p class="text-[9px] text-gray-500 font-black uppercase">${label}</p>
                        <p class="text-sm font-bold text-white truncate">${val || 'N/A'}</p>
                    </div>
                    <button onclick="copyText('${val}')" class="copy-btn">COPY</button>
                </div>
            `;
        }

        async function saveMember() {
            const editId = document.getElementById('edit-id').value;
            const payload = {
                full_name: document.getElementById('f-name').value,
                sponsor_name: document.getElementById('f-sponsor-name').value,
                email: document.getElementById('f-email').value,
                password: document.getElementById('f-pass').value,
                phone_no: document.getElementById('f-phone').value,
                associate_id: document.getElementById('f-assoc').value,
                level: document.getElementById('f-level').value
            };

            let res;
            if (editId) {
                res = await _supabase.from('network_members').update(payload).eq('id', editId);
            } else {
                payload.sponsor_id = activeUser.associate_id; // Added under you
                res = await _supabase.from('network_members').insert([payload]);
            }

            if (!res.error) {
                notify(editId ? "Updated!" : "Downline Added!", "blue");
                resetForm();
                loadTree();
            } else { notify("Error in Data!", "red"); }
        }

        function startEdit(m) {
            closeModal();
            document.getElementById('form-title').innerText = "Edit Member";
            document.getElementById('edit-id').value = m.id;
            document.getElementById('f-name').value = m.full_name;
            document.getElementById('f-sponsor-name').value = m.sponsor_name;
            document.getElementById('f-email').value = m.email;
            document.getElementById('f-pass').value = m.password;
            document.getElementById('f-phone').value = m.phone_no;
            document.getElementById('f-assoc').value = m.associate_id;
            document.getElementById('f-level').value = m.level;
            document.getElementById('save-btn').innerText = "Update Now";
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerText = "Add Downline";
            document.getElementById('save-btn').innerText = "Create Card";
            document.getElementById('cancel-btn').classList.add('hidden');
            ['f-name','f-sponsor-name','f-email','f-pass','f-phone','f-assoc'].forEach(id => document.getElementById(id).value = "");
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt);
            notify("Copied!", "blue");
        }

        function doSearch() {
            const term = document.getElementById('tree-search').value.toLowerCase();
            const filtered = myFullTree.filter(m => m.full_name.toLowerCase().includes(term) || m.associate_id.toLowerCase().includes(term));
            renderCards(filtered);
        }

        function logout() { localStorage.removeItem('vault_session'); location.reload(); }
        function notify(msg, col) {
            const t = document.getElementById('toast');
            t.className = `fixed top-5 right-5 px-6 py-3 rounded-xl z-[100] text-white font-black text-xs ${col === 'red' ? 'bg-red-600' : 'bg-blue-600'}`;
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
        function togglePass(id, btn) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
            btn.innerText = el.type === 'password' ? 'Show' : 'Hide';
        }
    </script>
</body>
</html>
