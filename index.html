<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Vault | Tree Hierarchy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-dark { background: #111; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        .card-self { border: 1px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .copy-btn { font-size: 9px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 900; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="toast" class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl z-[100] text-white font-bold"></div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-10 rounded-[2rem] w-full max-w-md">
            <h2 class="text-3xl font-black mb-8 text-center uppercase tracking-tighter">Login</h2>
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="Email" class="input-dark">
                <div class="relative">
                    <input type="password" id="l-pass" placeholder="Password" class="input-dark">
                    <button onclick="togglePass('l-pass', this)" class="absolute right-3 top-3 text-[10px] text-blue-500 font-bold uppercase">Show</button>
                </div>
                <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-xl font-bold mt-4">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-white/5 pb-6">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl" id="initials">?</div>
                <div>
                    <h1 class="text-2xl font-black"><span id="user-name"></span> <span class="text-blue-500 text-xs ml-1">(You)</span></h1>
                    <p id="user-level" class="text-blue-500 text-[10px] font-black uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-full border border-red-500/20 font-bold">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass p-8 rounded-3xl h-fit border-t-4 border-blue-600">
                <h3 class="text-xl font-black mb-6" id="form-title">Add Downline</h3>
                <div class="space-y-3">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="f-name" placeholder="Full Name" class="input-dark">
                    <input type="text" id="f-sponsor-name" placeholder="Sponsor Name" class="input-dark">
                    <input type="email" id="f-email" placeholder="Email" class="input-dark">
                    <input type="text" id="f-pass" placeholder="Password" class="input-dark">
                    <input type="text" id="f-phone" placeholder="Phone" class="input-dark">
                    <input type="text" id="f-assoc" placeholder="Associate ID" class="input-dark">
                    <select id="f-level" class="input-dark text-sm font-bold">
                        <option value="25%">25%</option>
                        <option value="35%">35%</option>
                        <option value="42%">42%</option>
                        <option value="50%(Supervisior)">50% (Supervisor)</option>
                        <option value="World Team">World Team</option>
                        <option value="GET Team">GET Team</option>
                        <option value="President Team">President Team</option>
                    </select>
                    <button onclick="saveMember()" id="save-btn" class="w-full bg-blue-600 p-4 rounded-xl font-black mt-4">Create Card</button>
                    <button onclick="resetForm()" id="cancel-btn" class="hidden w-full bg-white/5 p-4 rounded-xl font-bold mt-2">Cancel Edit</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="mb-6 flex justify-between items-center">
                    <h3 class="text-lg font-black uppercase tracking-widest text-gray-500">Your Team Hierarchy</h3>
                    <span id="team-count" class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-black"></span>
                </div>
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="glass w-full max-w-lg p-8 rounded-[2.5rem] relative">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-3xl text-gray-500 hover:text-white">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://znelnyiupddbelcsuvns.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeUser = null;
        let myTeam = [];

        window.onload = () => {
            const session = localStorage.getItem('vault_session');
            if (session) {
                activeUser = JSON.parse(session);
                showDashboard();
            }
        };

        async function login() {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value.trim();
            const { data } = await _supabase.from('network_members').select('*').eq('email', email).eq('password', pass);
            if (data && data.length > 0) {
                activeUser = data[0];
                localStorage.setItem('vault_session', JSON.stringify(activeUser));
                showDashboard();
            } else { notify("Login Failed!", "red"); }
        }

        function showDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-name').innerText = activeUser.full_name;
            document.getElementById('user-level').innerText = activeUser.level;
            document.getElementById('initials').innerText = activeUser.full_name.charAt(0);
            loadHierarchy();
        }

        async function loadHierarchy() {
            // SECURITY LOGIC: Fetch only self and direct/indirect downlines
            // Querying all members then filtering locally to build the tree
            const { data } = await _supabase.from('network_members').select('*');
            
            // Filter: Member is me OR Member's sponsor chain leads to me
            const buildTeam = (list, parentId) => {
                let team = list.filter(m => m.sponsor_id === parentId);
                let subTeam = [];
                team.forEach(m => {
                    subTeam = subTeam.concat(buildTeam(list, m.associate_id));
                });
                return team.concat(subTeam);
            };

            const myDownlines = buildTeam(data, activeUser.associate_id);
            myTeam = [activeUser, ...myDownlines]; // Result: Only me and my children
            
            document.getElementById('team-count').innerText = `${myTeam.length} MEMBERS IN YOUR TREE`;
            renderCards(myTeam);
        }

        function renderCards(list) {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            list.forEach(m => {
                const isMe = m.associate_id === activeUser.associate_id;
                const div = document.createElement('div');
                div.className = `glass p-6 rounded-2xl border transition-all cursor-pointer ${isMe ? 'card-self' : 'border-transparent hover:border-white/10'}`;
                div.onclick = () => openDetails(m);
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-mono text-gray-500">${m.associate_id}</span>
                        ${isMe ? '<span class="text-[9px] bg-blue-600 px-2 py-0.5 rounded-full font-black">YOU</span>' : ''}
                    </div>
                    <h4 class="text-lg font-bold mt-2">${m.full_name}</h4>
                    <p class="text-blue-500 text-[10px] font-black uppercase mt-1">${m.level}</p>
                `;
                grid.appendChild(div);
            });
        }

        function openDetails(m) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            const isMe = m.associate_id === activeUser.associate_id;

            body.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div class="h-14 w-14 bg-blue-600 rounded-xl flex items-center justify-center text-2xl font-black">${m.full_name.charAt(0)}</div>
                    <div>
                        <h2 class="text-xl font-black">${m.full_name}</h2>
                        <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest">${m.level}</p>
                    </div>
                </div>
                <div class="space-y-3 mb-8">
                    ${detailRow("Email", m.email)}
                    ${detailRow("Password", m.password)}
                    ${detailRow("Phone", m.phone_no)}
                    ${detailRow("Associate ID", m.associate_id)}
                    ${detailRow("Sponsor", m.sponsor_name)}
                </div>
                <div class="flex gap-3">
                    <button onclick='startEdit(${JSON.stringify(m)})' class="bg-blue-600 flex-1 py-3 rounded-xl font-black text-xs uppercase">Edit Member</button>
                    <button onclick="closeModal()" class="bg-white/10 px-6 py-3 rounded-xl font-black text-xs uppercase">Close</button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function detailRow(label, val) {
            return `
                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center">
                    <div class="truncate mr-4">
                        <p class="text-[9px] text-gray-500 font-black uppercase tracking-tighter">${label}</p>
                        <p class="text-sm font-bold text-white truncate">${val || 'N/A'}</p>
                    </div>
                    <button onclick="copyToClipboard('${val}')" class="copy-btn">Copy</button>
                </div>
            `;
        }

        function startEdit(m) {
            closeModal();
            document.getElementById('form-title').innerText = "Edit Member";
            document.getElementById('edit-id').value = m.id;
            document.getElementById('f-name').value = m.full_name;
            document.getElementById('f-sponsor-name').value = m.sponsor_name;
            document.getElementById('f-email').value = m.email;
            document.getElementById('f-pass').value = m.password;
            document.getElementById('f-phone').value = m.phone_no;
            document.getElementById('f-assoc').value = m.associate_id;
            document.getElementById('f-level').value = m.level;
            
            document.getElementById('save-btn').innerText = "Update Member";
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function saveMember() {
            const editId = document.getElementById('edit-id').value;
            const payload = {
                full_name: document.getElementById('f-name').value,
                sponsor_name: document.getElementById('f-sponsor-name').value,
                email: document.getElementById('f-email').value,
                password: document.getElementById('f-pass').value,
                phone_no: document.getElementById('f-phone').value,
                associate_id: document.getElementById('f-assoc').value,
                level: document.getElementById('f-level').value,
                sponsor_id: editId ? undefined : activeUser.associate_id // Only new members get active user as sponsor
            };

            let res;
            if (editId) {
                res = await _supabase.from('network_members').update(payload).eq('id', editId);
            } else {
                payload.sponsor_id = activeUser.associate_id;
                res = await _supabase.from('network_members').insert([payload]);
            }

            if (!res.error) {
                notify(editId ? "Updated!" : "Created!", "blue");
                resetForm();
                loadHierarchy();
            } else {
                notify("Error: Email/ID exists!", "red");
            }
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerText = "Add Downline";
            document.getElementById('save-btn').innerText = "Create Card";
            document.getElementById('cancel-btn').classList.add('hidden');
            ['f-name','f-sponsor-name','f-email','f-pass','f-phone','f-assoc'].forEach(id => document.getElementById(id).value = "");
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            notify("Copied: " + text, "blue");
        }

        function togglePass(id, btn) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
            btn.innerText = el.type === 'password' ? 'Show' : 'Hide';
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('vault_session'); location.reload(); }
        function notify(msg, col) {
            const t = document.getElementById('toast');
            t.className = `fixed top-5 right-5 px-6 py-3 rounded-xl z-[100] text-white font-black text-xs ${col === 'red' ? 'bg-red-600' : 'bg-blue-600'}`;
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
