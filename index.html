<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Vault | Fixed Click & Zoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --accent: #3b82f6; --bg: #050505; --card: #111; }
        body { background-color: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        
        #tree-viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; cursor: grab; background: radial-gradient(circle at center, #0f172a 0%, #050505 100%); }
        #tree-viewport:active { cursor: grabbing; }
        
        #drag-container { position: absolute; transform-origin: 0 0; will-change: transform; transition: transform 0.05s linear; display: flex; align-items: center; justify-content: center; padding: 500px; }
        
        .tree ul { padding-top: 40px; position: relative; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 40px 15px 0 15px; }
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid #333; width: 50%; height: 40px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #333; }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::after { border-radius: 10px 0 0 0; }
        .tree li:last-child::before { border-right: 2px solid #333; border-radius: 0 10px 0 0; }
        .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid #333; width: 0; height: 40px; }
        
        .node-card { background: var(--card); border: 2px solid #222; padding: 20px; border-radius: 24px; display: inline-block; min-width: 180px; max-width: 220px; cursor: pointer; transition: 0.2s; position: relative; z-index: 50; pointer-events: auto !important; }
        .node-card:active { transform: scale(0.95); border-color: var(--accent); }
        .active-user { border-color: var(--accent); background: #001e4d; box-shadow: 0 0 30px rgba(59,130,246,0.3); }
        
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        input, select { background: #000 !important; color: white !important; border: 1px solid #333 !important; }
        .hidden { display: none !important; }
        .action-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; width: 90%; max-width: 500px; }
        .zoom-badge { position: fixed; top: 100px; right: 20px; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); color: #888; }
    </style>
</head>
<body>

    <div id="search-bar" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] w-[90%] max-w-[600px] hidden">
        <div class="relative">
            <input type="text" id="tree-search" oninput="handleSearch()" placeholder="Search members..." class="w-full p-4 pl-12 rounded-2xl shadow-2xl outline-none backdrop-blur-md bg-black/50 border border-white/5">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
        </div>
    </div>

    <div id="zoom-level" class="zoom-badge hidden">100%</div>

    <div id="login-box" class="fixed inset-0 bg-black flex items-center justify-center z-[500] p-6">
        <div class="bg-[#111] p-8 rounded-[2.5rem] w-full max-w-md border border-white/10 text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-8 text-blue-500 uppercase italic">Vault Access</h2>
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="Email" class="w-full p-4 rounded-xl outline-none border border-white/10">
                <input type="password" id="l-pass" placeholder="Password" class="w-full p-4 rounded-xl outline-none border border-white/10">
                <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xl hover:bg-blue-700 transition">Login</button>
            </div>
        </div>
    </div>

    <div id="tree-viewer" class="hidden">
        <div id="tree-viewport">
            <div id="drag-container">
                <div id="tree-container" class="tree"></div>
            </div>
        </div>
    </div>

    <div id="search-results-view" class="hidden fixed inset-0 bg-black z-[150] overflow-y-auto pt-28 px-6"><div id="search-results-container" class="max-w-2xl mx-auto space-y-4 pb-20"></div></div>

    <div class="action-dock hidden" id="ui-actions">
        <button onclick="openAddForm()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-xl"><i data-lucide="user-plus" class="w-5 h-5"></i> ADD MEMBER</button>
        <button onclick="logout()" class="w-16 h-14 bg-white/10 text-white rounded-2xl flex items-center justify-center border border-white/10"><i data-lucide="log-out" class="w-6 h-6"></i></button>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-[1000] flex items-center justify-center p-4 backdrop-blur-xl overflow-y-auto">
        <div class="bg-[#111] w-full max-w-2xl p-6 md:p-10 rounded-[3rem] border border-white/10 my-auto relative" id="modal-inner"></div>
    </div>

    <script>
        const SB_URL = 'https://znelnyiupddbelcsuvns.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZWxueWl1cGRkYmVsY3N1dm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTMxMTgsImV4cCI6MjA5MDc4OTExOH0.aZV36Q-vgT1gy2KY4FFGPNtJ7KMEnroozECxA-gMAOg';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        let activeUser = null, members = [], visibleInTree = [];
        let isDragging = false, startX, startY, translateX = -500, translateY = -500, scale = 1;
        let lastTouchTime = 0, lastMoveDist = 0, evCache = [];

        async function login() {
            const e = document.getElementById('l-email').value.trim();
            const p = document.getElementById('l-pass').value.trim();
            const { data: user } = await _supabase.from('network_members').select('*').eq('email', e).single();
            if(user && user.password === p) {
                activeUser = user; localStorage.setItem('vault_user', JSON.stringify(activeUser)); showApp();
            } else alert("Error");
        }

        function showApp() {
            document.getElementById('login-box').classList.add('hidden');
            ["tree-viewer", "ui-actions", "search-bar", "zoom-level"].forEach(id => document.getElementById(id).classList.remove('hidden'));
            refreshTree(); initSystem();
        }

        async function refreshTree() {
            const { data } = await _supabase.from('network_members').select('*');
            members = data || []; visibleInTree = [];
            const root = members.find(m => m.id === activeUser.id) || activeUser;
            document.getElementById('tree-container').innerHTML = `<ul>${nodeToHTML(root)}</ul>`;
            lucide.createIcons();
            updateTransform();
        }

        function nodeToHTML(user) {
            visibleInTree.push(user);
            const children = members.filter(m => String(m.sponsor_name).trim().toLowerCase() === String(user.full_name).trim().toLowerCase() && String(m.sponsor_phone).trim() === String(user.phone_no).trim());
            const userEncoded = btoa(unescape(encodeURIComponent(JSON.stringify(user))));
            let html = `<li><div class="node-card ${user.id === activeUser.id ? 'active-user' : ''}" onpointerdown="startClickTrack()" onpointerup="handleCardClick(event, '${userEncoded}')">
                <p class="text-[10px] font-black text-blue-400 uppercase truncate-text">${user.level || '25%'}</p>
                <p class="text-lg font-black mt-1 truncate-text">${user.full_name}</p>
                <p class="text-[10px] opacity-40 truncate-text">${user.associate_id}</p>
            </div>`;
            if(children.length > 0) html += `<ul>${children.map(c => nodeToHTML(c)).join('')}</ul>`;
            return html + `</li>`;
        }

        function startClickTrack() { lastTouchTime = Date.now(); lastMoveDist = 0; }

        function handleCardClick(e, data) {
            const duration = Date.now() - lastTouchTime;
            // Agar touch 300ms se kam hai aur hila nahi hai, tabhi khulega
            if (duration < 300 && lastMoveDist < 10) {
                const user = JSON.parse(decodeURIComponent(escape(atob(data))));
                showDetails(user);
            }
        }

        function updateTransform() {
            const container = document.getElementById('drag-container');
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            document.getElementById('zoom-level').innerText = `${Math.round(scale * 100)}%`;
        }

        function initSystem() {
            const viewport = document.getElementById('tree-viewport');
            
            viewport.onpointerdown = (e) => {
                evCache.push(e);
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                viewport.setPointerCapture(e.pointerId);
            };

            viewport.onpointermove = (e) => {
                const idx = evCache.findIndex(ev => ev.pointerId === e.pointerId);
                evCache[idx] = e;

                if (evCache.length === 2) {
                    isDragging = false;
                    const diff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
                    if (viewport.lastDiff > 0) {
                        scale = Math.min(Math.max(0.2, scale + (diff - viewport.lastDiff) * 0.005), 2.5);
                        updateTransform();
                    }
                    viewport.lastDiff = diff;
                } else if (isDragging) {
                    let moveX = e.clientX - startX;
                    let moveY = e.clientY - startY;
                    lastMoveDist += Math.abs(moveX - translateX) + Math.abs(moveY - translateY);
                    translateX = moveX; translateY = moveY;
                    updateTransform();
                }
            };

            viewport.onpointerup = (e) => {
                evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
                if (evCache.length < 2) viewport.lastDiff = -1;
                if (evCache.length === 0) isDragging = false;
            };

            viewport.onwheel = (e) => {
                e.preventDefault();
                scale = Math.min(Math.max(0.2, scale + (e.deltaY < 0 ? 0.1 : -0.1)), 2.5);
                updateTransform();
            };
        }

        function showDetails(user) {
            const inner = document.getElementById('modal-inner');
            inner.innerHTML = `
                <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500"><i data-lucide="x"></i></button>
                <div class="flex flex-col items-center mb-8">
                    <div class="w-24 h-24 bg-gray-900 rounded-full flex items-center justify-center border-2 border-gray-800"><i data-lucide="user" class="text-gray-700 w-10 h-10"></i></div>
                    <h2 class="text-3xl font-black mt-4 text-center">${user.full_name}</h2>
                    <span class="text-blue-500 text-xs font-black uppercase tracking-widest">${user.level}</span>
                </div>
                <div class="grid grid-cols-1 gap-3 mb-8">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center gap-4"><i data-lucide="id-card" class="text-blue-500"></i><div><p class="text-[9px] text-gray-500 uppercase">Associate ID</p><p class="font-bold">${user.associate_id}</p></div></div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center gap-4"><i data-lucide="phone" class="text-blue-500"></i><div><p class="text-[9px] text-gray-500 uppercase">Phone</p><p class="font-bold">${user.phone_no}</p></div></div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center gap-4"><i data-lucide="lock" class="text-blue-500"></i><div><p class="text-[9px] text-gray-500 uppercase">Password</p><p class="font-bold">${user.password}</p></div></div>
                </div>
                <div class="flex gap-3"><button class="flex-[2] bg-blue-600 py-5 rounded-2xl font-black" onclick='openEditForm(${JSON.stringify(user)})'>EDIT</button><button class="flex-1 bg-white/10 py-5 rounded-2xl font-black" onclick="closeModal()">CLOSE</button></div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        }

        function handleSearch() {
            const q = document.getElementById('tree-search').value.toLowerCase().trim();
            const resV = document.getElementById('search-results-view'), resC = document.getElementById('search-results-container');
            if(!q) { resV.classList.add('hidden'); return; }
            resV.classList.remove('hidden');
            const filtered = visibleInTree.filter(m => m.full_name.toLowerCase().includes(q) || m.associate_id.toLowerCase().includes(q));
            resC.innerHTML = filtered.map(m => `<div class="bg-[#111] p-4 rounded-2xl border border-white/5 flex justify-between items-center" onclick='showDetails(${JSON.stringify(m)})'><div><p class="text-blue-500 text-[10px] font-black">${m.level}</p><p class="font-bold text-lg">${m.full_name}</p></div><i data-lucide="chevron-right"></i></div>`).join('');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('vault_user'); location.reload(); }
        function openAddForm() { renderForm(); }
        function openEditForm(user) { renderForm(user); }

        function renderForm(user = null) {
            const inner = document.getElementById('modal-inner');
            inner.innerHTML = `
                <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white transition"><i data-lucide="x"></i></button>
                <h2 class="text-2xl font-black mb-6 text-center">${user ? 'EDIT MEMBER' : 'NEW REGISTRATION'}</h2>
                <div class="space-y-3">
                    <input id="f-name" placeholder="Full Name" value="${user?.full_name || ''}" class="w-full p-4 rounded-xl outline-none">
                    <input id="f-phone" placeholder="Phone" value="${user?.phone_no || ''}" class="w-full p-4 rounded-xl outline-none">
                    <input id="f-pass" placeholder="Password" value="${user?.password || ''}" class="w-full p-4 rounded-xl outline-none">
                    <select id="f-level" class="w-full p-4 rounded-xl outline-none">${levels.map(l => `<option value="${l}" ${user?.level === l ? 'selected' : ''}>${l}</option>`).join('')}</select>
                    <div class="p-4 bg-blue-600/5 rounded-2xl border border-blue-500/20 space-y-3">
                        <p class="text-[10px] font-black text-blue-500 uppercase">Sponsor Verification</p>
                        <input id="f-sp-name" placeholder="Sponsor Name" value="${user?.sponsor_name || ''}" class="w-full p-3 rounded-xl outline-none bg-black">
                        <input id="f-sp-phone" placeholder="Sponsor Phone" value="${user?.sponsor_phone || ''}" class="w-full p-3 rounded-xl outline-none bg-black">
                    </div>
                    <button onclick="${user ? `saveUpdate('${user.id}')` : 'saveNewMember()'}" class="w-full bg-blue-600 p-4 rounded-xl font-black mt-4">SAVE DATA</button>
                </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        }

        async function saveUpdate(id) {
            const p = getFields();
            const { error } = await _supabase.from('network_members').update(p).eq('id', id);
            if(!error) { closeModal(); refreshTree(); }
        }

        async function saveNewMember() {
            const p = getFields();
            const { error } = await _supabase.from('network_members').insert([p]);
            if(!error) { closeModal(); refreshTree(); }
        }

        function getFields() { return { full_name: document.getElementById('f-name').value.trim(), phone_no: document.getElementById('f-phone').value.trim(), password: document.getElementById('f-pass').value.trim(), level: document.getElementById('f-level').value, sponsor_name: document.getElementById('f-sp-name').value.trim(), sponsor_phone: document.getElementById('f-sp-phone').value.trim() }; }

        window.onload = () => { if(localStorage.getItem('vault_user')) { activeUser = JSON.parse(localStorage.getItem('vault_user')); showApp(); } };
    </script>
</body>
</html>
